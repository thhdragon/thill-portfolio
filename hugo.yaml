# Hugo configuration file
title: Tyler Hill - Portfolio

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Table of Contents
      pageRef: /toc
      weight: 2
    - name: Resume
      pageRef: /resume
      weight: 3
    - name: Degree Pathway
      pageRef: /pathway
      weight: 4
    - name: Transcripts
      weight: 5
      pageRef: /transcripts
    - name: Courses
      pageRef: /courses
      weight: 6
    - name: Projects
      pageRef: /projects
      weight: 7
    - name: Certifications
      pageRef: /certifications
      weight: 8
    - name: Engagement
      pageRef: /engagement
      weight: 9
    - name: Activities
      pageRef: /activities
      weight: 10
    - name: GitHub
      weight: 11
      url: https://github.com/thhdragon
      params:
        type: link
        icon: github

params:
  page:
    displayPagination: true

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  #   editURL:
  #     enable: true
  #     base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
