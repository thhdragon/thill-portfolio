# Hugo configuration file
baseURL: "https://thhdragon.github.io/"
title: Tyler Hill - Portfolio

enableInlineShortcodes: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Table of Contents
      pageRef: /toc
      weight: 2
    - name: Resume
      pageRef: /resume
      weight: 3
    - name: Degree Pathway
      pageRef: /pathway
      weight: 4
    - name: Transcripts
      weight: 5
      pageRef: /transcripts
    - name: Courses
      pageRef: /courses
      weight: 6
    - name: Projects
      pageRef: /projects
      weight: 7
    - name: Certifications
      pageRef: /certifications
      weight: 8
    - name: Engagement
      pageRef: /engagement
      weight: 9
    - name: Activities
      pageRef: /activities
      weight: 10
    - name: GitHub
      weight: 11
      url: https://github.com/thhdragon
      params:
        type: link
        icon: github

